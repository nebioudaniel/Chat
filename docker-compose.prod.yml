services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_prod_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://mongo:27017/chatapp
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3001
    depends_on:
      - mongo

volumes:
  mongo_prod_data:
